<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="瀏覽所有可用飯店">
    <title>飯店列表 - 兆基訂房系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <a href="/" class="navbar-brand">🏨 兆基訂房系統</a>
                <ul class="navbar-menu">
                    <li><a href="/">首頁</a></li>
                    <li><a href="/hotels.html">飯店列表</a></li>
                    <li><a href="/admin.html">管理後台</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="hero" style="min-height: 300px;">
        <div class="container">
            <div class="hero-content">
                <h1>探索所有飯店</h1>
                <p>找到最適合您的住宿選擇</p>
            </div>
        </div>
    </section>

    <!-- Hotels List Section -->
    <section class="section">
        <div class="container-wide">
            <div style="display: grid; grid-template-columns: 300px 1fr; gap: 2rem; align-items: start;">
                <!-- Filters Sidebar -->
                <div class="card" style="position: sticky; top: 100px;">
                    <div class="card-content">
                        <h3 style="margin-bottom: 1.5rem;">篩選條件</h3>

                        <div class="form-group" style="margin-bottom: 1.5rem;">
                            <label for="searchQuery">搜尋</label>
                            <input type="text" id="searchQuery" placeholder="飯店名稱或城市">
                        </div>

                        <div class="form-group" style="margin-bottom: 1.5rem;">
                            <label for="cityFilter">城市</label>
                            <select id="cityFilter">
                                <option value="">所有城市</option>
                                <option value="Taipei">台北</option>
                                <option value="Kaohsiung">高雄</option>
                                <option value="Hualien">花蓮</option>
                            </select>
                        </div>

                        <div class="form-group" style="margin-bottom: 1.5rem;">
                            <label for="minRating">最低評分</label>
                            <select id="minRating">
                                <option value="">不限</option>
                                <option value="3">3.0+</option>
                                <option value="4">4.0+</option>
                                <option value="4.5">4.5+</option>
                            </select>
                        </div>

                        <div class="form-group" style="margin-bottom: 1.5rem;">
                            <label for="maxPrice">最高價格 (每晚)</label>
                            <input type="number" id="maxPrice" placeholder="不限" min="0" step="100">
                        </div>

                        <button class="btn btn-primary" onclick="applyFilters()" style="width: 100%;">
                            套用篩選
                        </button>
                        <button class="btn btn-outline" onclick="clearFilters()"
                            style="width: 100%; margin-top: 0.5rem;">
                            清除篩選
                        </button>
                    </div>
                </div>

                <!-- Hotels Grid -->
                <div>
                    <div style="margin-bottom: 1.5rem;">
                        <h2 id="resultsCount">載入中...</h2>
                    </div>

                    <div id="hotelsList" class="grid grid-2">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 兆基訂房系統. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        let currentFilters = {};

        async function loadHotels(filters = {}) {
            const container = document.getElementById('hotelsList');
            const countElement = document.getElementById('resultsCount');

            container.innerHTML = '<div class="spinner"></div>';

            const hotels = await fetchAllHotels(filters);

            countElement.textContent = `找到 ${hotels.length} 間飯店`;

            if (hotels.length === 0) {
                container.innerHTML = '<p class="text-center">沒有符合條件的飯店</p>';
                return;
            }

            container.innerHTML = hotels.map(hotel => {
                const amenitiesHtml = hotel.amenities && hotel.amenities.length > 0
                    ? hotel.amenities.slice(0, 3).map(a => `<span class="amenity-tag">${a}</span>`).join('')
                    : '';

                return `
                    <div class="card">
                        <div class="card-image-wrapper">
                            <img src="${hotel.main_image || 'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800'}" 
                                 alt="${hotel.name}" 
                                 class="card-image">
                            ${hotel.star_rating ? `<div class="card-badge">${'⭐'.repeat(hotel.star_rating)}</div>` : ''}
                        </div>
                        <div class="card-content">
                            <h3 class="card-title">${hotel.name}</h3>
                            <p class="card-subtitle">📍 ${hotel.city}, ${hotel.country}</p>
                            <p class="card-description">${hotel.description ? hotel.description.substring(0, 120) + '...' : ''}</p>
                            
                            <div class="amenities">
                                ${amenitiesHtml}
                            </div>
                            
                            <div class="card-footer">
                                <div>
                                    <div class="rating">
                                        <span class="rating-stars">${renderStars(hotel.rating)}</span>
                                        <span class="rating-value">${hotel.rating}</span>
                                    </div>
                                    ${hotel.min_price ? `
                                        <div class="card-price">
                                            ${formatCurrency(hotel.min_price)}
                                            <span class="card-price-label">/ 晚起</span>
                                        </div>
                                    ` : ''}
                                </div>
                                <button class="btn btn-secondary" onclick="viewHotelDetails(${hotel.id})">查看詳情</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function applyFilters() {
            const filters = {};

            const search = document.getElementById('searchQuery').value;
            const city = document.getElementById('cityFilter').value;
            const minRating = document.getElementById('minRating').value;
            const maxPrice = document.getElementById('maxPrice').value;

            if (search) filters.search = search;
            if (city) filters.city = city;
            if (minRating) filters.minRating = minRating;
            if (maxPrice) filters.maxPrice = maxPrice;

            currentFilters = filters;
            loadHotels(filters);
        }

        function clearFilters() {
            document.getElementById('searchQuery').value = '';
            document.getElementById('cityFilter').value = '';
            document.getElementById('minRating').value = '';
            document.getElementById('maxPrice').value = '';
            currentFilters = {};
            loadHotels();
        }

        // Load hotels on page load
        window.addEventListener('DOMContentLoaded', () => {
            // Check if there are search params from home page
            const searchParams = sessionStorage.getItem('searchParams');
            if (searchParams) {
                const params = JSON.parse(searchParams);
                if (params.destination) {
                    document.getElementById('searchQuery').value = params.destination;
                    currentFilters.search = params.destination;
                }
                sessionStorage.removeItem('searchParams');
            }

            loadHotels(currentFilters);
        });
    </script>
</body>

</html>
