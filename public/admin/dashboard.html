<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>營運數據儀表板 - 線上訂房系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"
        crossorigin="anonymous">
    <link rel="stylesheet" href="/css/admin-bi.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
        integrity="sha384-9nhczxUqK87bcKHh20fSQcTGD4qq5GhayNYSYWqwBkINBhOfQLg/P5HG5lF1urn4"
        crossorigin="anonymous"></script>
</head>

<body>

    <div class="sidebar">
        <h2>營運數據 BI</h2>
        <nav>
            <ul style="list-style: none; padding: 0;">
                <li class="mb-1"><a href="/admin.html" style="color: #9CA3AF; text-decoration: none;">🏠
                        返回管理首頁</a></li>
                <li style="margin-bottom: 1rem; color: white; font-weight: 600;">📊 數據儀表板</li>
            </ul>
        </nav>
    </div>

    <div class="main-content">
        <header class="mb-15">
            <h1>營運數據分析 (Business Intelligence)</h1>
            <p style="color: #6B7280;">即時追蹤您的飯店營運績效</p>
        </header>

        <div class="grid">
            <!-- Revenue Chart -->
            <!-- Revenue Chart Removed -->

            <!-- Occupancy Chart -->
            <div class="card">
                <h3>房型佔有率 (Occupancy by Room Type)</h3>
                <canvas id="occupancyChart"></canvas>
            </div>

            <!-- Staff Performance -->
            <div class="card">
                <h3>房務效率 (Staff Performance - Avg Resolution)</h3>
                <canvas id="performanceChart"></canvas>
            </div>

            <!-- Quick Stats -->
            <div class="card stat-card">
                <div class="stat-value" id="totalBookings">--</div>
                <div class="stat-label">本月總訂單量</div>
            </div>
        </div>
    </div>

    <script src="/js/admin-dashboard.js"></script>
</body>

</html>
