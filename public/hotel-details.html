<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="飯店詳細資訊">
    <title>飯店詳情 - 兆基訂房系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <a href="/" class="navbar-brand">🏨 兆基訂房系統</a>
                <ul class="navbar-menu">
                    <li><a href="/">首頁</a></li>
                    <li><a href="/hotels.html">飯店列表</a></li>
                    <li><a href="/admin.html">管理後台</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hotel Details -->
    <div id="hotelDetails">
        <div class="spinner" style="margin: 4rem auto;"></div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 兆基訂房系統. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        async function loadHotelDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const hotelId = urlParams.get('id');

            if (!hotelId) {
                window.location.href = '/hotels.html';
                return;
            }

            const hotel = await fetchHotelById(hotelId);

            if (!hotel) {
                document.getElementById('hotelDetails').innerHTML = `
                    <div class="container section">
                        <p class="text-center">找不到此飯店</p>
                    </div>
                `;
                return;
            }

            const amenitiesHtml = hotel.amenities && hotel.amenities.length > 0
                ? hotel.amenities.map(a => `<span class="amenity-tag">${a}</span>`).join('')
                : '';

            const roomsHtml = hotel.rooms && hotel.rooms.length > 0
                ? hotel.rooms.map(room => {
                    const roomAmenities = room.amenities && room.amenities.length > 0
                        ? room.amenities.slice(0, 5).map(a => `<span class="amenity-tag">${a}</span>`).join('')
                        : '';

                    return `
                        <div class="card">
                            <div class="card-image-wrapper">
                                <img src="${room.main_image || 'https://images.unsplash.com/photo-1611892440504-42a792e24d32?w=800'}" 
                                     alt="${room.room_type}" 
                                     class="card-image">
                            </div>
                            <div class="card-content">
                                <h3 class="card-title">${room.room_type}</h3>
                                <p class="card-subtitle">🛏️ ${room.bed_type} | 👥 最多 ${room.max_occupancy} 人 | 📐 ${room.size_sqm || 'N/A'} m²</p>
                                <p class="card-description">${room.description || ''}</p>
                                
                                <div class="amenities">
                                    ${roomAmenities}
                                </div>
                                
                                <div class="card-footer">
                                    <div class="card-price">
                                        ${formatCurrency(room.price_per_night)}
                                        <span class="card-price-label">/ 晚</span>
                                    </div>
                                    <button class="btn btn-secondary" onclick="bookRoom(${room.id}, ${hotel.id})">立即預訂</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('')
                : '<p class="text-center">目前沒有可用的房型</p>';

            document.getElementById('hotelDetails').innerHTML = `
                <!-- Hero Image -->
                <div style="position: relative; height: 500px; overflow: hidden;">
                    <img src="${hotel.main_image || 'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1200'}" 
                         alt="${hotel.name}"
                         style="width: 100%; height: 100%; object-fit: cover;">
                    <div style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); padding: 3rem 0;">
                        <div class="container">
                            <h1 style="color: white; font-size: 3rem; margin-bottom: 0.5rem;">${hotel.name}</h1>
                            <p style="color: white; font-size: 1.25rem;">📍 ${hotel.address}, ${hotel.city}, ${hotel.country}</p>
                            <div class="rating" style="margin-top: 1rem;">
                                <span class="rating-stars" style="font-size: 1.5rem;">${renderStars(hotel.rating)}</span>
                                <span class="rating-value" style="color: white; font-size: 1.25rem;">${hotel.rating}</span>
                                <span style="color: white; margin-left: 1rem;">${'⭐'.repeat(hotel.star_rating)} 飯店</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Hotel Info -->
                <section class="section">
                    <div class="container">
                        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; margin-bottom: 3rem;">
                            <div>
                                <h2>關於此飯店</h2>
                                <p style="font-size: 1.125rem; line-height: 1.8;">${hotel.description || '暫無描述'}</p>
                            </div>
                            <div class="card">
                                <div class="card-content">
                                    <h3>聯絡資訊</h3>
                                    <p style="margin-top: 1rem;">📞 ${hotel.phone || 'N/A'}</p>
                                    <p>📧 ${hotel.email || 'N/A'}</p>
                                    <p>📍 ${hotel.address}</p>
                                    <p>${hotel.city}, ${hotel.country} ${hotel.postal_code || ''}</p>
                                </div>
                            </div>
                        </div>
                        
                        <div style="margin-bottom: 3rem;">
                            <h2>飯店設施</h2>
                            <div class="amenities" style="margin-top: 1rem;">
                                ${amenitiesHtml}
                            </div>
                        </div>
                        
                        <div>
                            <h2 style="margin-bottom: 2rem;">可預訂房型</h2>
                            <div class="grid grid-2">
                                ${roomsHtml}
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        window.addEventListener('DOMContentLoaded', loadHotelDetails);
    </script>
</body>

</html>
